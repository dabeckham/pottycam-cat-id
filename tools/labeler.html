<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pottycam labeler</title>
<style>
  :root{
    --sapphire:#3b82f6; --emerald:#10b981; --ruby:#ef4444; --diamond:#a855f7; --reject:#6b7280;
    --bg:#14161a; --panel:#1e2127; --ink:#e8eaed; --muted:#9aa0a6; --line:#2c313a;
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.4 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);
         padding:10px 16px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  h1{margin:0 0 2px;font-size:16px}
  .steps{color:var(--muted);font-size:13px;margin:2px 0 8px}
  .steps b{color:var(--ink)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .brush{border:2px solid var(--line);background:#232833;color:var(--ink);border-radius:8px;
         padding:7px 12px;cursor:pointer;font-size:14px;font-weight:600;display:flex;gap:6px;align-items:center;
         transition:transform .05s}
  .brush .k{background:#0c0e12;border:1px solid var(--line);border-radius:4px;padding:0 6px;font-size:12px;color:var(--muted)}
  .brush .sub{font-weight:400;color:var(--muted);font-size:12px}
  .brush:hover{transform:translateY(-1px)}
  .brush.active{color:#fff}
  .brush[data-cat="Sapphire"].active{background:var(--sapphire);border-color:var(--sapphire)}
  .brush[data-cat="Emerald"].active{background:var(--emerald);border-color:var(--emerald)}
  .brush[data-cat="Ruby"].active{background:var(--ruby);border-color:var(--ruby)}
  .brush[data-cat="Diamond"].active{background:var(--diamond);border-color:var(--diamond)}
  .brush[data-cat="reject"].active{background:var(--reject);border-color:var(--reject)}
  .hint{margin-left:auto;color:var(--muted);font-size:13px}
  #undo{border:1px solid var(--line);background:#232833;color:var(--ink);border-radius:8px;padding:7px 12px;cursor:pointer}
  #undo:disabled{opacity:.4;cursor:default}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .tab{border:1px solid var(--line);background:#191c22;color:var(--muted);border-radius:16px;
       padding:4px 12px;cursor:pointer;font-size:13px}
  .tab.active{background:#0c0e12;color:var(--ink);border-color:#4b5563}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:14px}
  .card{position:relative;border:3px solid transparent;border-radius:8px;overflow:hidden;cursor:pointer;
        background:#000;aspect-ratio:1/1}
  .card img{width:100%;height:100%;object-fit:cover;display:block}
  .card:hover{outline:2px solid #4b5563}
  .card.gone{opacity:0;transform:scale(.85);transition:opacity .18s,transform .18s;pointer-events:none}
  .badge{position:absolute;left:4px;bottom:4px;font-size:11px;font-weight:700;color:#fff;
         padding:1px 6px;border-radius:4px}
  .empty{color:var(--muted);padding:40px;text-align:center;grid-column:1/-1}
  #need{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#3a2020;color:#ffb4b4;
        border:1px solid #7f1d1d;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none}
  #need.show{opacity:1}
</style>
</head>
<body>
<header>
  <h1>pottycam labeler — which cat is this?</h1>
  <div class="steps"><b>1.</b> Click a name to pick it (it lights up). &nbsp; <b>2.</b> Click each photo that IS that cat — one at a time. &nbsp; <b>3.</b> Bad photo (hand, scoop, empty, blurry)? Pick <b>Reject</b> and click it. &nbsp; Mistake? <b>Undo</b> (u).</div>
  <div class="row" id="brushes">
    <button class="brush" data-cat="Sapphire"><span class="k">1</span>Sapphire<span class="sub">smallest white</span></button>
    <button class="brush" data-cat="Emerald"><span class="k">2</span>Emerald<span class="sub">medium white</span></button>
    <button class="brush" data-cat="Ruby"><span class="k">3</span>Ruby<span class="sub">largest white</span></button>
    <button class="brush" data-cat="Diamond"><span class="k">4</span>Diamond<span class="sub">darker / pointed</span></button>
    <button class="brush" data-cat="reject"><span class="k">x</span>Reject<span class="sub">not a cat / bad</span></button>
    <button id="undo" disabled><span class="k">u</span> Undo</button>
    <span class="hint" id="counts">…</span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>
<div id="grid"><div class="empty">loading…</div></div>
<div id="need">Pick a name first ↑ then click the photo</div>

<script>
const CLASSES = ["Sapphire","Emerald","Ruby","Diamond"];
const COLORS = {Sapphire:"var(--sapphire)",Emerald:"var(--emerald)",Ruby:"var(--ruby)",Diamond:"var(--diamond)",reject:"var(--reject)"};
let clusters = [];        // [{cluster, crops:[...]}]
let decided = new Set();  // crop basenames already labeled/rejected
let active = null;        // current brush ("Sapphire".. or "reject")
let curTab = 0;
let counts = {labeled:0, rejected:0};

const $ = s => document.querySelector(s);
const grid = $("#grid"), tabsEl = $("#tabs");

async function api(path, body){
  const opt = body ? {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)} : {};
  const r = await fetch(path, opt);
  return {ok:r.ok, status:r.status, data: await r.json().catch(()=>({}))};
}

function undecidedOf(c){ return c.crops.filter(x => !decided.has(x)); }

function setBrush(cat){
  active = cat;
  document.querySelectorAll(".brush").forEach(b => b.classList.toggle("active", b.dataset.cat === cat));
}

function renderTabs(){
  tabsEl.innerHTML = "";
  clusters.forEach((c,i) => {
    const n = undecidedOf(c).length;
    const t = document.createElement("button");
    t.className = "tab" + (i===curTab?" active":"");
    t.textContent = `Cluster ${c.cluster} · ${n} left`;
    t.onclick = () => { curTab = i; renderTabs(); renderGrid(); };
    tabsEl.appendChild(t);
  });
}

function updateCounts(){
  const remaining = clusters.reduce((s,c)=>s+undecidedOf(c).length,0);
  $("#counts").textContent = `${counts.labeled} named · ${counts.rejected} rejected · ${remaining} left total`;
}

function flashNeed(){ const n=$("#need"); n.classList.add("show"); clearTimeout(flashNeed._t); flashNeed._t=setTimeout(()=>n.classList.remove("show"),1200); }

async function decide(crop, cardEl){
  if(!active){ flashNeed(); return; }
  const isReject = active === "reject";
  const res = await api(isReject ? "/api/reject" : "/api/label",
                        isReject ? {crop, reason:"not-a-cat"} : {crop, name:active});
  if(res.ok){
    decided.add(crop);
    if(res.data.counts) counts = res.data.counts;
    // paint + remove the tile
    const badge = document.createElement("div");
    badge.className = "badge"; badge.style.background = COLORS[active];
    badge.textContent = isReject ? "rejected" : active;
    cardEl.appendChild(badge);
    cardEl.classList.add("gone");
    setTimeout(()=>{ cardEl.remove(); if(!grid.querySelector(".card")) renderGrid(); }, 180);
    $("#undo").disabled = false;
    renderTabs(); updateCounts();
  } else if(res.status === 409){
    decided.add(crop); cardEl.remove();   // already decided elsewhere; just drop it
  }
}

function renderGrid(){
  const c = clusters[curTab];
  grid.innerHTML = "";
  if(!c){ grid.innerHTML='<div class="empty">no clusters found</div>'; return; }
  const items = undecidedOf(c);
  if(!items.length){ grid.innerHTML = `<div class="empty">Cluster ${c.cluster} done — pick another tab above.</div>`; return; }
  const frag = document.createDocumentFragment();
  items.forEach(crop => {
    const card = document.createElement("div");
    card.className = "card";
    const img = document.createElement("img");
    img.loading = "lazy"; img.src = "/crop/" + encodeURIComponent(crop);
    card.appendChild(img);
    card.onclick = () => decide(crop, card);
    frag.appendChild(card);
  });
  grid.appendChild(frag);
}

async function doUndo(){
  const res = await api("/api/undo", {});
  if(res.ok){
    if(res.data.undone) decided.delete(res.data.undone);
    if(res.data.counts) counts = res.data.counts;
    $("#undo").disabled = !res.data.can_undo;
    renderTabs(); renderGrid(); updateCounts();
  }
}

document.querySelectorAll(".brush").forEach(b => b.onclick = () => setBrush(b.dataset.cat));
$("#undo").onclick = doUndo;
window.addEventListener("keydown", e => {
  if(e.key === "1") setBrush("Sapphire");
  else if(e.key === "2") setBrush("Emerald");
  else if(e.key === "3") setBrush("Ruby");
  else if(e.key === "4") setBrush("Diamond");
  else if(e.key.toLowerCase() === "x") setBrush("reject");
  else if(e.key.toLowerCase() === "u") doUndo();
});

(async function init(){
  const [cl, st] = await Promise.all([api("/api/clusters"), api("/api/state")]);
  clusters = (cl.data.clusters || []).sort((a,b)=>a.cluster-b.cluster);
  decided = new Set([...(st.data.labeled||[]), ...(st.data.rejected||[])]);
  counts = st.data.counts || {labeled:0,rejected:0};
  $("#undo").disabled = !st.data.can_undo;
  renderTabs(); renderGrid(); updateCounts();
})();
</script>
</body>
</html>
